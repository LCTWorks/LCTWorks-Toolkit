name: Pack & Publish LCTWorks.WinUI

on:
  push:
    branches:
      - release/winui/*
  workflow_dispatch:

jobs:
  publish:
    uses: ./.github/workflows/pack-and-publish-all.yml
    with:
      TriggerBranch: "release/winui/"
      ProjectName: "LCTWorks.WinUI/LCTWorks.WinUI.csproj"
      UpdatePackages: "LCTWorks.Core,LCTWorks.Telemetry"
      Runner: "windows-latest"
      UseMSBuild: true
    secrets:
      NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}

  tag:
    needs: publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create and push tag
        run: |
          TAG="WinUI-${{ needs.publish.outputs.version }}"
          git tag "$TAG"
          git push origin "$TAG"